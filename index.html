<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidewalk Saints Vending Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="machine-stage" aria-label="Sidewalk Saints Custom Label Dispenser">
        <img class="machine-shell" src="assets/machine-shell.png" alt="Sidewalk Saints Custom Label Dispenser vending machine">

        <!-- Live label windows over the empty machine windows -->
        <div class="label-grid" id="labelGrid" aria-label="Selected labels">
            <!-- 12 slots will be generated here by script.js -->
        </div>

        <!-- Invisible working controls over the rendered machine buttons -->
        <button class="hotspot hotspot-insert" id="insertQuarterBtn" aria-label="Insert quarter">
            INSERT QUARTER
        </button>

        <button class="hotspot hotspot-shake" id="shakeBtn" aria-label="Shake the machine">
            SHAKE THE MACHINE
        </button>

        <!-- Live odometer over the rendered odometer plate -->
        <div class="odometer-overlay" aria-label="Dispensed to date">
            <span id="odometerValue">000000</span>
        </div>
    </main>

    <!-- Selection Modal -->
    <div class="modal" id="selectionModal">
        <div class="modal-overlay"></div>
        <div class="modal-panel">
            <div class="modal-header">SELECT LABEL</div>

            <div class="modal-content">
                <div class="strain-selector" id="strainSelector">
                    <label class="strain-label">Strain:</label>
                    <select id="strainDropdown" class="strain-dropdown">
                        <option value="">-- Choose Strain --</option>
                    </select>
                </div>

                <div class="label-options" id="labelOptions" style="display: none;">
                    <div class="options-header">Available Labels:</div>
                    <div class="options-grid" id="optionsGrid">
                        <!-- Label thumbnails will be inserted here -->
                    </div>
                </div>
            </div>

            <button class="modal-close" id="modalCloseBtn">CANCEL</button>
        </div>
    </div>

    <!-- Donation Modal -->
    <div class="modal" id="donationModal">
        <div class="modal-overlay"></div>
        <div class="modal-panel donation-panel">
            <div class="modal-header">INSERT DONATION</div>

            <div class="modal-content donation-content">
                <button class="donation-button" data-amount="1.00">
                    <div class="donation-amount">$1.00</div>
                </button>
                <button class="donation-button" id="customDonationBtn">
                    <div class="donation-amount">CUSTOM</div>
                </button>
            </div>

            <button class="modal-close" id="donationCloseBtn">CANCEL</button>
        </div>
    </div>

    <!-- Custom Donation Modal -->
    <div class="modal" id="customDonationModal">
        <div class="modal-overlay"></div>
        <div class="modal-panel custom-panel">
            <div class="modal-header">CUSTOM AMOUNT</div>

            <div class="modal-content custom-content">
                <div class="currency-input">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="customAmountInput" placeholder="0.00" step="0.01" min="0" max="999">
                </div>
            </div>

            <div class="modal-buttons">
                <button class="modal-button confirm-button" id="confirmCustomBtn">OK</button>
                <button class="modal-button cancel-button" id="cancelCustomBtn">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- Dispense animation modal -->
    <div class="modal" id="dispenseModal">
        <div class="modal-overlay"></div>
        <div class="modal-panel dispense-panel">
            <div class="dispense-animation">
                <div class="rattle"></div>
                <div class="dispense-text">DISPENSING...</div>
            </div>
        </div>
    </div>

    <script src="labelCatalog.js"></script>
    <script src="assets/pdf-lib.min.js"></script>
    <script src="pdfGenerator.js"></script>
    <script src="script.js"></script>
</body>
</html>
